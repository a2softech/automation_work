name: Daily File Creator

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-file:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js (avoid deprecation warning)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Daily File
        run: |
          TODAY=$(TZ="Asia/Kolkata" date +'%d-%m-%Y')
          FILENAME="file_${TODAY}.txt"
          echo "Today date is ${TODAY}" > $FILENAME
          echo "File created: $FILENAME"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add daily file for $(TZ="Asia/Kolkata" date +'%d-%m-%Y')"
            git push
          fi