name: Daily File Creator (Zero Warnings)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

# API ke through file likhne ke liye permission
permissions:
  contents: write

jobs:
  create-file:
    runs-on: ubuntu-latest
    steps:
      - name: Create File Directly via GitHub API
        run: |
          # 1. Aaj ki date nikalna (Indian Time)
          TODAY=$(TZ="Asia/Kolkata" date +'%d-%m-%Y')
          FILENAME="file_${TODAY}.txt"
          
          # 2. File ke andar ka text likhna
          CONTENT="Today date is ${TODAY}"
          
          # 3. Text ko Base64 format me badalna (GitHub API ko base64 samajh aata hai)
          BASE64_CONTENT=$(echo -n "$CONTENT" | base64 -w 0)
          
          # 4. Direct GitHub API ko hit karke file create karna (Bina kisi Git action ke)
          curl -s -L \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/contents/$FILENAME \
            -d "{\"message\":\"Add daily file for $TODAY\",\"content\":\"$BASE64_CONTENT\"}"