name: Daily AI Programmer (Final Stable Version)

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  generate-code:
    runs-on: ubuntu-latest
    steps:
      - name: Generate AI Program
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 1. Date aur Filename set karna
          TODAY=$(TZ="Asia/Kolkata" date +'%d-%m-%Y')
          FILENAME="logic_program_${TODAY}.py"
          
          # 2. Gemini API request payload file banana (Isse syntax error nahi aayega)
          cat <<EOF > payload.json
          {
            "contents": [{
              "parts":[{"text": "Give me a unique Python programming logic or snippet for today. Include a small comment explaining it. Give ONLY the code, no markdown blocks like \`\`\`python."}]
            }]
          }
          EOF

          # 3. API call karna
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_KEY" \
              -H 'Content-Type: application/json' \
              -d @payload.json)

          # 4. Code extract karna aur file banana
          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' > "$FILENAME"

          # 5. Base64 encoding
          BASE64_CONTENT=$(cat "$FILENAME" | base64 -w 0)

          # 6. GitHub API payload file banana
          cat <<EOF > github_payload.json
          {
            "message": "AI Logic for $TODAY",
            "content": "$BASE64_CONTENT"
          }
          EOF

          # 7. File push karna
          curl -s -L \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/contents/"$FILENAME" \
            -d @github_payload.json