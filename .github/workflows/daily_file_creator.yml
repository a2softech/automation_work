name: Daily File Creator

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

# Isse permission wala error (128) solve ho jayega
permissions:
  contents: write

jobs:
  create-file:
    runs-on: ubuntu-latest
    steps:
      # Updated to v4 for Node.js 24 compatibility
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Daily File
        run: |
          TODAY=$(date +'%d-%m-%Y')
          FILENAME="file_${TODAY}.txt"
          echo "Today date is ${TODAY}" > $FILENAME
          echo "File created: $FILENAME"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Add daily file for $(date +'%d-%m-%Y')" || exit 0
          git push