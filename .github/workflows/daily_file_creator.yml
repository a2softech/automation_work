name: Daily AI Programmer (Final No-Error Version)

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  generate-code:
    runs-on: ubuntu-latest
    steps:
      - name: Generate AI Program
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 1. Date aur Unique Time nikalna (taaki SHA error na aaye)
          TIMESTAMP=$(TZ="Asia/Kolkata" date +'%d-%m-%Y_%H-%M-%S')
          FILENAME="logic_program_${TIMESTAMP}.py"
          
          # 2. Gemini API Payload
          cat <<EOF > payload.json
          {
            "contents": [{
              "parts":[{"text": "Write a unique Python program for a beginner. Provide ONLY the code. No markdown formatting like \`\`\`."}]
            }]
          }
          EOF

          # 3. API Call
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_KEY" \
              -H 'Content-Type: application/json' \
              -d @payload.json)

          # 4. Extracting code
          AI_CODE=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$AI_CODE" ] || [ "$AI_CODE" == "null" ]; then
             echo "# AI failed. Manual entry for $TIMESTAMP" > "$FILENAME"
             echo "print('Hello from Automation!')" >> "$FILENAME"
          else
             echo "$AI_CODE" > "$FILENAME"
          fi

          # 5. Push to GitHub (New unique filename will never need a SHA)
          BASE64_CONTENT=$(cat "$FILENAME" | base64 -w 0)
          
          cat <<EOF > github_payload.json
          {
            "message": "AI Logic for $TIMESTAMP",
            "content": "$BASE64_CONTENT"
          }
          EOF

          curl -s -L \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/contents/"$FILENAME" \
            -d @github_payload.json