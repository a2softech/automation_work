name: Daily AI Programmer (Free Tier)

on:
  schedule:
    - cron: '30 0 * * *' # 6:00 AM IST par chalega
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  generate-code:
    runs-on: ubuntu-latest
    steps:
      - name: Generate AI Program
        run: |
          TODAY=$(TZ="Asia/Kolkata" date +'%d-%m-%Y')
          FILENAME="logic_program_${TODAY}.py"

          # Gemini 1.5 Flash (Free Tier) ko call karna
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
              -H 'Content-Type: application/json' \
              -d '{
                "contents": [{
                  "parts":[{"text": "Give me a unique Python programming logic/snippet for today. Include a small comment explaining it. Give ONLY the code, no markdown blocks like ```python."}]
                }]
              }')

          # Response se raw text nikalna
          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' > $FILENAME

          # GitHub API ke liye content encode karna
          BASE64_CONTENT=$(cat $FILENAME | base64 -w 0)

          # Repository me file push karna
          curl -s -L \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            [https://api.github.com/repos/$](https://api.github.com/repos/$){{ github.repository }}/contents/$FILENAME \
            -d "{\"message\":\"AI Logic: $TODAY\",\"content\":\"$BASE64_CONTENT\"}"